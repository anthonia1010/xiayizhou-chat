<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏以昼 · 智能对话</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-ui}
        body{background:#eef2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
        .chat{max-width:900px;width:100%;height:90vh;background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);border-radius:32px;display:flex;flex-direction:column;overflow:hidden}
        .top{padding:20px;background:rgba(255,255,255,0.5);border-bottom:1px solid rgba(0,0,0,0.05);text-align:center;position:relative}
        .top h2{color:#333;font-size:18px;font-weight:600}
        .settings-btn{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:#007aff;border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .msgs{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
        .bubble{max-width:75%;padding:12px 18px;border-radius:24px;font-size:15px;line-height:1.5;word-break:break-word}
        .me{align-self:flex-end;background:#007aff;color:#fff;border-bottom-right-radius:8px}
        .bot{align-self:flex-start;background:#fff;color:#000;border-bottom-left-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
        .bot.error{background:#fff0f0;color:#c00}
        .typing{background:#e9eef3;padding:8px 16px;border-radius:20px;font-size:13px;width:fit-content;display:none}
        .typing.active{display:block}
        .input-area{padding:16px;background:rgba(255,255,255,0.6);display:flex;gap:12px;align-items:center}
        input{flex:1;padding:14px 20px;border-radius:40px;border:none;outline:none;font-size:15px;background:#f5f5f7}
        input:focus{background:#fff;box-shadow:0 0 0 2px #007aff}
        button{background:#007aff;border:none;border-radius:40px;width:48px;height:48px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
        button:hover{background:#0066dd}
        button:disabled{background:#ccc;cursor:not-allowed}
        .settings-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:1000}
        .settings-overlay.active{display:flex}
        .settings-panel{background:#fff;border-radius:24px;padding:32px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
        .settings-panel h3{font-size:20px;margin-bottom:24px;color:#333}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;font-size:14px;color:#666;margin-bottom:8px}
        .form-group input{width:100%;padding:14px 20px;border-radius:12px;border:none;outline:none;font-size:15px;background:#f5f5f7}
        .form-group select{width:100%;padding:14px 20px;border-radius:12px;border:none;outline:none;font-size:15px;background:#f5f5f7;cursor:pointer}
        .settings-panel .btn-group{display:flex;gap:12px;margin-top:24px}
        .btn-group button{flex:1;border-radius:12px;width:auto;height:48px;font-size:15px}
        .btn-cancel{background:#f5f5f7;color:#333}
        .btn-cancel:hover{background:#e5e5e5}
        .btn-save{background:#34c759}
        .btn-save:hover{background:#2da44e}
        .saved-badge{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#34c759;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:1001}
        .saved-badge.show{opacity:1}
        .timestamp{font-size:11px;color:#999;text-align:center;margin:8px 0}
        .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff9500,#ff6b00);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:bold;flex-shrink:0}
        .bot-msg{display:flex;gap:10px;align-items:flex-start}
        .bot-msg .avatar{margin-top:2px}
        .model-group {
            font-size: 12px;
            color: #999;
            font-style: italic;
            padding-left: 14px;
        }
    </style>
</head>
<body>
<div class="chat">
    <div class="top">
        <h2>🌙 夏以昼 · 智能对话</h2>
        <button class="settings-btn" id="settingsBtn">⚙</button>
    </div>
    <div class="msgs" id="msgs">
        <div class="bot-msg">
            <div class="avatar">夏</div>
            <div class="bubble bot">在吗？今天过得怎么样？</div>
        </div>
    </div>
    <div class="typing" id="typing">对方正在输入...</div>
    <div class="input-area">
        <input id="inp" placeholder="说点什么..." autocomplete="off">
        <button id="send">➤</button>
    </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <h3>⚙️ 设置</h3>
        <div class="form-group">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>模型</label>
            <select id="modelSelect">
                <optgroup label="DeepSeek (深度求索)">
                    <option value="deepseek-ai/DeepSeek-V4-Flash" selected>DeepSeek-V4-Flash (推荐)</option>
                    <option value="deepseek-chat">DeepSeek Chat</option>
                    <option value="deepseek-r1.5-chat">DeepSeek R1.5</option>
                    <option value="deepseek-r2-chat">DeepSeek R2</option>
                </optgroup>
                <optgroup label="OpenAI">
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="gpt-3.5-turbo-16k">GPT-3.5 Turbo 16K</option>
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-4-turbo-preview">GPT-4 Turbo</option>
                    <option value="gpt-4o">GPT-4o</option>
                </optgroup>
                <optgroup label="Anthropic Claude">
                    <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                    <option value="claude-3-sonnet-20240229">Claude 3 Sonnet</option>
                    <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                </optgroup>
                <optgroup label="Google Gemini">
                    <option value="gemini-pro">Gemini Pro</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                </optgroup>
                <optgroup label="阿里云 Qwen">
                    <option value="qwen-turbo">Qwen Turbo</option>
                    <option value="qwen-plus">Qwen Plus</option>
                    <option value="qwen-max">Qwen Max</option>
                    <option value="qwen-max-longcontext">Qwen Max Long</option>
                </optgroup>
                <optgroup label="百度文心一言">
                    <option value="ernie-speed">ERNIE Speed</option>
                    <option value="ernie-3.5">ERNIE 3.5</option>
                    <option value="ernie-3.5-8k">ERNIE 3.5 8K</option>
                    <option value="ernie-4.0">ERNIE 4.0</option>
                </optgroup>
            </select>
        </div>
        <div class="form-group">
            <label>服务器地址（默认留空）</label>
            <input type="text" id="serverUrl" placeholder="http://localhost:8080">
        </div>
        <div class="btn-group">
            <button class="btn-cancel" id="cancelBtn">取消</button>
            <button class="btn-save" id="saveBtn">保存</button>
        </div>
    </div>
</div>

<div class="saved-badge" id="savedBadge">✓ 设置已保存</div>

<script>
const API_URL = '/api/chat';
const DEFAULT_MODEL = 'deepseek-ai/DeepSeek-V4-Flash';

const msgsEl = document.getElementById('msgs');
const inpEl = document.getElementById('inp');
const sendBtn = document.getElementById('send');
const typingEl = document.getElementById('typing');
const settingsOverlay = document.getElementById('settingsOverlay');
const settingsBtn = document.getElementById('settingsBtn');
const cancelBtn = document.getElementById('cancelBtn');
const saveBtn = document.getElementById('saveBtn');
const apiKeyInput = document.getElementById('apiKey');
const modelSelect = document.getElementById('modelSelect');
const serverUrlInput = document.getElementById('serverUrl');
const savedBadge = document.getElementById('savedBadge');

let apiKey = localStorage.getItem('apiKey') || '';
let model = localStorage.getItem('model') || DEFAULT_MODEL;
let serverUrl = localStorage.getItem('serverUrl') || '';

apiKeyInput.value = apiKey;
modelSelect.value = model;
serverUrlInput.value = serverUrl;

const chatHistory = [];

function getCurrentTimestamp() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    return `${hours}:${minutes}`;
}

function addMessage(content, isMe = false, isError = false) {
    const timestamp = getCurrentTimestamp();

    if (isMe) {
        const div = document.createElement('div');
        div.className = 'bubble me';
        div.textContent = content;
        msgsEl.appendChild(div);
    } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'bot-msg';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '夏';

        const bubble = document.createElement('div');
        bubble.className = 'bot' + (isError ? ' error' : '');
        bubble.textContent = content;

        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        msgsEl.appendChild(msgDiv);
    }

    const timeDiv = document.createElement('div');
    timeDiv.className = 'timestamp';
    timeDiv.textContent = timestamp;
    msgsEl.appendChild(timeDiv);

    msgsEl.scrollTop = msgsEl.scrollHeight;
}

function setTyping(show) {
    typingEl.classList.toggle('active', show);
}

async function sendMessage() {
    const content = inpEl.value.trim();
    if (!content) return;

    if (!apiKey) {
        addMessage('请先在设置中配置 API Key', false, true);
        return;
    }

    addMessage(content, true);
    inpEl.value = '';
    chatHistory.push({ role: 'user', content });
    setTyping(true);
    sendBtn.disabled = true;

    try {
        const baseUrl = serverUrl || '';
        const response = await fetch(`${baseUrl}${API_URL}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: chatHistory,
                apiKey: apiKey,
                model: model
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || '请求失败');
        }

        addMessage(data.message);
        chatHistory.push({ role: 'assistant', content: data.message });
    } catch (err) {
        addMessage('Error: ' + err.message, false, true);
    } finally {
        setTyping(false);
        sendBtn.disabled = false;
    }
}

inpEl.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

sendBtn.addEventListener('click', sendMessage);

settingsBtn.addEventListener('click', () => {
    settingsOverlay.classList.add('active');
});

cancelBtn.addEventListener('click', () => {
    settingsOverlay.classList.remove('active');
});

saveBtn.addEventListener('click', () => {
    apiKey = apiKeyInput.value.trim();
    model = modelSelect.value;
    serverUrl = serverUrlInput.value.trim();

    localStorage.setItem('apiKey', apiKey);
    localStorage.setItem('model', model);
    localStorage.setItem('serverUrl', serverUrl);

    settingsOverlay.classList.remove('active');
    savedBadge.classList.add('show');
    setTimeout(() => savedBadge.classList.remove('show'), 2000);
});

settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) {
        settingsOverlay.classList.remove('active');
    }
});
</script>
</body>
</html>
